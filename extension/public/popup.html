<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMail AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #1f2937; }
    .container { padding: 20px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e5e7eb; }
    .logo { width: 32px; height: 32px; background: #4F46E5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header span { font-size: 11px; color: #6b7280; display: block; }
    .user-info { display: flex; align-items: center; gap: 10px; padding: 12px; background: white; border-radius: 8px; margin-bottom: 16px; border: 1px solid #e5e7eb; }
    .user-info img { width: 36px; height: 36px; border-radius: 50%; }
    .user-info .name { font-weight: 500; font-size: 14px; }
    .user-info .email { font-size: 12px; color: #6b7280; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; text-decoration: none; color: #1f2937; }
    .btn:hover { background: #f3f4f6; border-color: #4F46E5; }
    .btn-primary { background: #4F46E5; color: white; border-color: #4F46E5; }
    .btn-primary:hover { background: #4338CA; }
    .btn svg { width: 16px; height: 16px; }
    .login-section { text-align: center; padding: 30px 10px; }
    .login-section p { margin: 12px 0 20px; font-size: 13px; color: #6b7280; }
    .footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; text-align: center; }
    .footer a { font-size: 12px; color: #4F46E5; text-decoration: none; }
    .hidden { display: none; }
    .plan-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #dbeafe; color: #1d4ed8; font-weight: 600; text-transform: uppercase; }
    .plan-badge.pro { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">S</div>
      <div>
        <h1>SmartMail AI</h1>
        <span>AI Email Assistant</span>
      </div>
    </div>

    <div id="logged-in" class="hidden">
      <div class="user-info">
        <img id="user-avatar" src="" alt="Avatar">
        <div>
          <div class="name" id="user-name"></div>
          <div class="email" id="user-email"></div>
        </div>
        <span class="plan-badge" id="user-plan"></span>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          Open Sidebar
        </button>
        <button class="btn" id="btn-compose">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Quick Compose
        </button>
        <a class="btn" id="btn-dashboard" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Open Dashboard
        </a>
        <button class="btn" id="btn-logout" style="color: #ef4444;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </div>

    <div id="logged-out">
      <div class="login-section">
        <div class="logo" style="width:48px;height:48px;font-size:24px;margin:0 auto;">S</div>
        <p>Sign in to start using AI-powered email assistance</p>
        <button class="btn btn-primary" id="btn-login" style="justify-content:center;width:100%;">
          Sign in with Google
        </button>
      </div>
    </div>

    <div class="footer">
      <a href="http://localhost:3000" target="_blank">SmartMail AI Dashboard</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
