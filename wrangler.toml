name = "addy-ai"
compatibility_date = "2024-09-02"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "addy-ai-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "addy-ai-documents"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
FROM_EMAIL = "zzouhari@rmchomemortgage.com"
SENDER_NAME = "Clearpath Processor"
APP_URL = "https://addy-ai.pages.dev"

